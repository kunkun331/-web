  name: Sync Google Sheets                                                                           
                                                            
  on:
    schedule:
      - cron: '0 1 * * *'
    workflow_dispatch:

  permissions:
    contents: write

  jobs:
    sync:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4

        - name: Fetch & convert sheet data
          run: python3 sync.py
          env:
            SHEET_CSV_URL: ${{ secrets.SHEET_CSV_URL }}

        - name: Commit if changed
          run: |
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add data.json
            git diff --staged --quiet || (git commit -m "chore: sync show data from Google Sheets" &&
   git push)
