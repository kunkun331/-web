<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎤脱口秀专场上新早知道</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f11;
      --card-bg: #1a1a1f;
      --accent: #674cff;
      --text: #e8e8e8;
      --text-muted: #888;
      --border: #2a2a35;
      --modal-bg: #16161c;
      --session-bg: #1e1e26;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Segoe UI', sans-serif;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      padding: 32px 40px 24px;
      border-bottom: 1px solid var(--border);
    }
    header h1 { font-size: 26px; font-weight: 700; letter-spacing: -0.3px; }
    header h1 span { color: var(--accent); }
    header p { color: var(--text-muted); margin-top: 6px; font-size: 14px; }

    /* ── Toolbar ── */
    .toolbar {
      padding: 20px 40px;
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }
    .search-input {
      flex: 1;
      min-width: 180px;
      max-width: 320px;
      padding: 9px 14px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 14px;
      outline: none;
    }
    .search-input:focus { border-color: var(--accent); }
    .filter-btn {
      padding: 8px 14px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-muted);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .filter-btn:hover, .filter-btn.active {
      border-color: var(--accent);
      color: var(--accent);
    }
    .btn-add {
      margin-left: auto;
      padding: 9px 18px;
      background: var(--accent);
      border: none;
      border-radius: 8px;
      color: white;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn-add:hover { opacity: 0.85; }

    /* ── Grid ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      padding: 0 40px 48px;
    }
    @media (max-width: 1100px) {
      .grid { grid-template-columns: repeat(3, 1fr); }
    }
    @media (max-width: 900px) {
      .grid { grid-template-columns: repeat(2, 1fr); padding: 0 20px 40px; }
      .toolbar, header { padding-left: 20px; padding-right: 20px; }
    }
    @media (max-width: 560px) {
      .grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
    }

    /* ── Card ── */
    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.18s, border-color 0.18s, box-shadow 0.18s;
    }
    .card:hover {
      transform: translateY(-4px);
      border-color: var(--accent);
      box-shadow: 0 8px 28px rgba(255, 107, 53, 0.18);
    }
    .card-cover {
      aspect-ratio: 3 / 4;
      position: relative;
      overflow: hidden;
      background-size: cover;
      background-position: center;
    }
    .card-cover-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: rgba(255,255,255,0.25);
      font-size: 13px;
    }
    .card-cover-placeholder span {
      font-size: 40px;
      opacity: 0.3;
    }
    .card-performer {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 8px;
    }
    .card-price {
      font-size: 13px;
      color: var(--accent);
      font-weight: 600;
      margin-bottom: 8px;
    }
    .session-badge {
      position: absolute;
      top: 12px;
      right: 12px;
      background: var(--accent);
      color: white;
      font-size: 11px;
      font-weight: 700;
      padding: 3px 9px;
      border-radius: 20px;
    }
    .card-body { padding: 14px 16px 16px; }
    .card-title {
      font-weight: 600;
      font-size: 14px;
      line-height: 1.4;
      margin-bottom: 4px;
    }
    .city-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 11px; }
    .city-tag {
      background: #252530;
      color: var(--text-muted);
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 20px;
    }
    .city-tag-more { color: var(--accent); background: rgba(103,76,255,0.1); }
    .next-show {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 12px;
      color: var(--text-muted);
    }
    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* ── Modal base ── */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.72);
      z-index: 200;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      backdrop-filter: blur(4px);
    }
    .overlay.show { display: flex; }
    .modal {
      background: var(--modal-bg);
      border: 1px solid var(--border);
      border-radius: 18px;
      width: 100%;
      max-width: 620px;
      max-height: 88vh;
      overflow-y: auto;
      position: relative;
      animation: popIn 0.18s ease;
    }
    @keyframes popIn {
      from { transform: scale(0.96); opacity: 0; }
      to   { transform: scale(1);    opacity: 1; }
    }
    .modal-header {
      padding: 26px 26px 18px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: var(--modal-bg);
      z-index: 1;
    }
    .modal-header h2 { font-size: 20px; font-weight: 700; }
    .modal-header .sub { color: var(--text-muted); font-size: 13px; margin-top: 4px; }
    .close-btn {
      position: absolute;
      top: 18px;
      right: 18px;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: var(--border);
      border: none;
      color: var(--text-muted);
      font-size: 17px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .close-btn:hover { background: var(--accent); color: white; }
    .modal-body { padding: 20px 26px 26px; }

    /* ── Session list in detail modal ── */
    .section-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 12px;
    }
    .session-item {
      background: var(--session-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 10px;
      transition: border-color 0.15s;
    }
    .session-item:hover { border-color: #3a3a50; }
    .session-city {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .badge-sm {
      font-size: 10px;
      padding: 2px 7px;
      border-radius: 10px;
      font-weight: 600;
    }
    .badge-ticketing { background: rgba(103, 76, 255,0.15); color: var(--accent); }
    .badge-past      { background: #252530; color: #555; }
    .badge-ugc       { background: rgba(76,175,80,0.15); color: #4caf50; }
    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 14px;
    }
    .info-item label {
      font-size: 10px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      display: block;
      margin-bottom: 3px;
    }
    .info-item span { font-size: 13px; }
    .ticket-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      background: var(--accent);
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      transition: opacity 0.15s;
    }
    .ticket-btn:hover { opacity: 0.85; }
    .no-link { font-size: 12px; color: #555; margin-top: 2px; }

    /* ── UGC Form ── */
    .form-group { margin-bottom: 14px; }
    .form-group label {
      display: block;
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 6px;
    }
    .form-group input,
    .form-group select {
      width: 100%;
      padding: 9px 12px;
      background: var(--session-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 14px;
      outline: none;
      font-family: inherit;
    }
    .form-group input:focus,
    .form-group select:focus { border-color: var(--accent); }
    .form-group select option { background: var(--session-bg); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .btn-primary {
      width: 100%;
      padding: 11px;
      background: var(--accent);
      border: none;
      border-radius: 8px;
      color: white;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 6px;
      transition: opacity 0.15s;
    }
    .btn-primary:hover { opacity: 0.85; }
    .btn-link {
      background: none;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-muted);
      font-size: 13px;
      cursor: pointer;
      padding: 8px 16px;
      transition: all 0.15s;
    }
    .btn-link:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Filter row ── */
    .filter-row {
      padding: 0 40px 14px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    @media (max-width: 900px) { .filter-row { padding-left: 20px; padding-right: 20px; } }
    .filter-divider { width: 1px; height: 18px; background: var(--border); flex-shrink: 0; }
    .time-btn {
      padding: 5px 13px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--text-muted);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .time-btn:hover, .time-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(103, 76, 255,0.08); }
    .city-dropdown-wrap { position: relative; }
    .city-toggle-btn {
      padding: 5px 13px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--text-muted);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s;
      display: flex; align-items: center; gap: 5px;
      white-space: nowrap;
    }
    .city-toggle-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(103, 76, 255,0.08); }
    .city-toggle-btn .chevron { font-size: 10px; transition: transform 0.2s; }
    .city-toggle-btn.open .chevron { transform: rotate(180deg); }
    .city-dropdown {
      position: absolute;
      top: calc(100% + 8px);
      left: 0;
      background: var(--modal-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
      display: flex; flex-wrap: wrap; gap: 7px;
      z-index: 50;
      box-shadow: 0 8px 24px rgba(0,0,0,0.45);
      min-width: 260px;
      animation: popIn 0.15s ease;
    }
    .city-opt {
      padding: 5px 13px;
      background: var(--session-bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--text-muted);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .city-opt:hover, .city-opt.active { border-color: var(--accent); color: var(--accent); background: rgba(103, 76, 255,0.08); }

    /* ── Show more ── */
    .show-more-btn {
      padding: 10px 32px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 24px;
      color: var(--text-muted);
      font-size: 14px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .show-more-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Detail: show header ── */
    .d-show-header { display: flex; align-items: center; gap: 14px; padding-bottom: 18px; border-bottom: 1px solid var(--border); margin-bottom: 18px; }
    .d-show-thumb { width: 64px; height: 64px; border-radius: 10px; background-size: cover; background-position: center; background-color: var(--card-bg); flex-shrink: 0; }
    .d-show-meta { font-size: 13px; color: var(--text-muted); margin-top: 4px; }

    /* ── Detail: city grid ── */
    .city-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 18px; }
    .city-card { background: var(--session-bg); border: 1px solid var(--border); border-radius: 12px; padding: 16px 10px; text-align: center; cursor: pointer; transition: all 0.15s; }
    .city-card:hover { border-color: var(--accent); background: rgba(103,76,255,0.08); }
    .city-card-name { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
    .city-card-date { font-size: 12px; color: var(--text-muted); margin-bottom: 6px; }
    .city-card-status { font-size: 12px; }
    .city-card-status.s-ticketing { color: var(--accent); }
    .city-card-status.s-upcoming { color: #a294f8; }
    .city-card-status.s-past { color: #555; }

    /* ── Detail: city back ── */
    .detail-back { display: inline-flex; align-items: center; gap: 5px; color: var(--text-muted); font-size: 13px; cursor: pointer; margin-bottom: 18px; padding-bottom: 14px; border-bottom: 1px solid var(--border); width: 100%; }
    .detail-back:hover { color: var(--text); }

    /* ── Empty state ── */
    .empty {
      grid-column: 1 / -1;
      text-align: center;
      padding: 64px 20px;
      color: var(--text-muted);
      font-size: 15px;
    }

    /* ── Share ── */
    .btn-share {
      padding: 9px 16px;
      background: none;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-muted);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-share:hover { border-color: var(--accent); color: var(--accent); }
    .card-share-btn {
      position: absolute;
      top: 10px;
      left: 10px;
      padding: 4px 10px;
      background: rgba(0,0,0,0.55);
      border: none;
      border-radius: 20px;
      color: rgba(255,255,255,0.85);
      font-size: 11px;
      cursor: pointer;
      backdrop-filter: blur(4px);
      transition: background 0.15s;
    }
    .card-share-btn:hover { background: rgba(103, 76, 255,0.8); color: white; }
    .share-city-bar { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 16px; }
    .share-city-btn {
      padding: 4px 12px;
      background: var(--session-bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--text-muted);
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .share-city-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(103, 76, 255,0.08); }
    #share-preview {
      width: 100%;
      height: 180px;
      background: var(--session-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 13px;
      line-height: 1.8;
      padding: 12px;
      resize: none;
      outline: none;
      font-family: inherit;
      margin-bottom: 14px;
    }
    .share-actions { display: flex; gap: 10px; }
    .share-actions button {
      flex: 1;
      padding: 11px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: opacity 0.15s;
    }
    .share-actions button:hover { opacity: 0.85; }
    .btn-copy   { background: var(--session-bg); border: 1px solid var(--border); color: var(--text); }
    .btn-poster { background: var(--accent); border: none; color: white; }
    .modal-share-btn {
      width: 30px; height: 30px;
      border-radius: 50%;
      background: rgba(255,255,255,0.07);
      border: none;
      color: var(--text-muted);
      font-size: 15px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
      flex-shrink: 0;
    }
    .modal-share-btn:hover { background: var(--accent); color: white; }
    .session-share-btn {
      margin-left: auto;
      padding: 3px 10px;
      background: none;
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--text-muted);
      font-size: 11px;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .session-share-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* ── UGC Tabs ── */
    .ugc-tabs {
      display: flex;
      gap: 6px;
      margin-bottom: 18px;
      background: var(--session-bg);
      padding: 4px;
      border-radius: 10px;
    }
    .ugc-tab {
      flex: 1;
      padding: 8px;
      border: none;
      border-radius: 7px;
      background: none;
      color: var(--text-muted);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
    }
    .ugc-tab.active {
      background: var(--card-bg);
      color: var(--text);
      font-weight: 600;
    }

    /* ── Admin panel ── */
    .admin-item {
      background: var(--session-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 10px;
    }
    .admin-item-title { font-weight: 600; font-size: 14px; }
    .admin-item-meta  { font-size: 12px; color: var(--text-muted); margin-top: 3px; }
    .admin-actions    { display: flex; gap: 8px; margin-top: 12px; }
    .btn-approve {
      padding: 7px 16px;
      background: rgba(76,175,80,0.12);
      border: 1px solid #4caf50;
      border-radius: 8px;
      color: #4caf50;
      font-size: 13px;
      cursor: pointer;
      font-family: inherit;
    }
    .btn-reject {
      padding: 7px 16px;
      background: rgba(103, 76, 255,0.1);
      border: 1px solid var(--accent);
      border-radius: 8px;
      color: var(--accent);
      font-size: 13px;
      cursor: pointer;
      font-family: inherit;
    }
    .admin-empty {
      text-align: center;
      padding: 40px;
      color: var(--text-muted);
      font-size: 14px;
    }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #2a3a2a;
      color: #4caf50;
      padding: 10px 20px;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 500;
      opacity: 0;
      transition: all 0.25s;
      z-index: 999;
      pointer-events: none;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>

<header>
  <h1 onclick="onTitleClick()" style="cursor:default">🎤脱口秀专场<span>上新早知道</span></h1>
  <p>全国巡演场次信息，点击专场查看详情与购票</p>
</header>

<div class="toolbar">
  <input class="search-input" type="text" id="searchInput" placeholder="搜索专场或演员..." oninput="render()">
  <button class="filter-btn active" onclick="setFilter('all', this)">全部</button>
  <button class="filter-btn" onclick="setFilter('upcoming', this)">即将演出</button>
  <button class="filter-btn" onclick="setFilter('ticketing', this)">抢票中</button>
  <button class="btn-share" onclick="openShareAll()">↗ 分享</button>
  <button class="btn-add" onclick="openUGC()">+ 补充场次</button>
</div>

<div class="filter-row">
  <div style="display:flex;gap:6px">
    <button class="time-btn active" onclick="setTimeFilter('all',this)">📅 全部时间</button>
    <button class="time-btn" onclick="setTimeFilter('week',this)">本周</button>
    <button class="time-btn" onclick="setTimeFilter('month',this)">本月</button>
    <button class="time-btn" onclick="setTimeFilter('next',this)">下月</button>
  </div>
  <div class="filter-divider"></div>
  <div class="city-dropdown-wrap">
    <button class="city-toggle-btn" id="cityToggle" onclick="toggleCityMenu()">
      📍 <span id="city-label">全部城市</span> <span class="chevron">▾</span>
    </button>
    <div class="city-dropdown" id="cityDropdown" style="display:none"></div>
  </div>
</div>

<div class="grid" id="grid"></div>

<!-- ── Detail Modal ── -->
<div class="overlay" id="detailOverlay" onclick="onOverlayClick(event,'detailOverlay')">
  <div class="modal" id="detailModal">
    <div class="modal-header">
      <h2 id="d-title"></h2>
      <p class="sub" id="d-sub"></p>
      <div style="position:absolute;top:18px;right:18px;display:flex;gap:8px;align-items:center">
        <button class="modal-share-btn" id="d-share-btn" title="分享全部场次">↗</button>
        <button class="close-btn" style="position:static" onclick="closeDetail()">&#215;</button>
      </div>
    </div>
    <div class="modal-body" id="d-body"></div>
  </div>
</div>

<!-- ── UGC Modal ── -->

<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
<script>
// ─────────────────────────────────────────
// 演出数据（从 data.json 动态加载）
// ─────────────────────────────────────────
let shows = [];

// ─────────────────────────────────────────
// 工具函数
// ─────────────────────────────────────────
const now = new Date();

function fmt(str) {
  if (!str) return '待公布';
  const d = new Date(str);
  const dateStr = d.toLocaleDateString('zh-CN', { year: 'numeric', month: 'long', day: 'numeric' });
  // 只有日期（无时间 或 时间为 00:00）时，不显示时间
  const hasTime = str.includes(':') && !str.endsWith('00:00') && !str.endsWith('T00:00');
  return hasTime ? dateStr + ' ' + d.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' }) : dateStr;
}

function isPast(s)      { return new Date(s.showTime) <= now; }
function isUpcoming(s)  { return new Date(s.showTime) > now; }
function isTicketing(s) {
  const sale = new Date(s.ticketSaleTime);
  return s.ticketSaleTime && sale <= now && isUpcoming(s);
}

function nextSession(show) {
  return show.sessions
    .filter(isUpcoming)
    .sort((a,b) => new Date(a.showTime) - new Date(b.showTime))[0] || null;
}

// ─────────────────────────────────────────
// 渲染卡片
// ─────────────────────────────────────────
let currentFilter     = 'all';
let currentCity       = 'all';
let currentTimeFilter = 'all';

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function setTimeFilter(f, btn) {
  currentTimeFilter = f;
  document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function getTimeRange(filter) {
  const now = new Date();
  if (filter === 'week') {
    const day = now.getDay() || 7;
    const mon = new Date(now); mon.setDate(now.getDate() - day + 1); mon.setHours(0,0,0,0);
    const sun = new Date(mon); sun.setDate(mon.getDate() + 6); sun.setHours(23,59,59,999);
    return { start: mon, end: sun };
  }
  if (filter === 'month') {
    const start = new Date(now.getFullYear(), now.getMonth(), 1);
    const end   = new Date(now.getFullYear(), now.getMonth() + 1, 0, 23, 59, 59, 999);
    return { start, end };
  }
  if (filter === 'next') {
    const start = new Date(now.getFullYear(), now.getMonth() + 1, 1);
    const end   = new Date(now.getFullYear(), now.getMonth() + 2, 0, 23, 59, 59, 999);
    return { start, end };
  }
  return null;
}

function setCity(city) {
  currentCity = city;
  document.getElementById('city-label').textContent = city === 'all' ? '全部城市' : city;
  const toggle = document.getElementById('cityToggle');
  toggle.classList.toggle('active', city !== 'all');
  closeCityMenu();
  buildCityBar();
  render();
}

function toggleCityMenu() {
  const dropdown = document.getElementById('cityDropdown');
  const toggle   = document.getElementById('cityToggle');
  const isOpen   = dropdown.style.display !== 'none';
  if (isOpen) {
    closeCityMenu();
  } else {
    dropdown.style.display = 'flex';
    toggle.classList.add('open');
    setTimeout(() => document.addEventListener('click', outsideCityClick), 0);
  }
}

function closeCityMenu() {
  document.getElementById('cityDropdown').style.display = 'none';
  document.getElementById('cityToggle').classList.remove('open');
  document.removeEventListener('click', outsideCityClick);
}

function outsideCityClick(e) {
  const wrap = document.querySelector('.city-dropdown-wrap');
  if (wrap && !wrap.contains(e.target)) closeCityMenu();
}

function buildCityBar() {
  const cities = [...new Set(shows.flatMap(s => s.sessions.map(ss => ss.city)))].sort();
  document.getElementById('cityDropdown').innerHTML =
    ['all', ...cities].map(c =>
      `<button class="city-opt${c === currentCity ? ' active' : ''}" onclick="setCity('${c}')">
        ${c === 'all' ? '全部' : c}
      </button>`
    ).join('');
}

function render() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const grid = document.getElementById('grid');

  const timeRange = getTimeRange(currentTimeFilter);

  let list = shows.filter(show => {
    const matchQ = !q
      || show.name.toLowerCase().includes(q)
      || show.performer.toLowerCase().includes(q)
      || show.sessions.some(s => s.city.includes(q) || s.venue.toLowerCase().includes(q));
    if (!matchQ) return false;
    if (currentCity !== 'all' && !show.sessions.some(s => s.city === currentCity)) return false;
    if (currentFilter === 'upcoming')  return show.sessions.some(isUpcoming);
    if (currentFilter === 'ticketing') return show.sessions.some(isTicketing);
    if (timeRange) {
      return show.sessions.some(s => {
        const d = new Date(s.showTime);
        return d >= timeRange.start && d <= timeRange.end;
      });
    }
    return true;
  });

  // 按最近开演时间排序
  const nowStr = new Date().toISOString().slice(0, 16).replace('T', ' ');
  list.sort((a, b) => {
    const nextA = a.sessions.map(s => s.showTime).filter(t => t >= nowStr).sort()[0] || '9999';
    const nextB = b.sessions.map(s => s.showTime).filter(t => t >= nowStr).sort()[0] || '9999';
    return nextA < nextB ? -1 : nextA > nextB ? 1 : 0;
  });

  if (!list.length) {
    grid.innerHTML = '<div class="empty">没有找到相关专场</div>';
    return;
  }

  grid.innerHTML = list.map(show => {
    const cities       = [...new Set(show.sessions.map(s => s.city))];
    const upcomingCnt  = show.sessions.filter(isUpcoming).length;
    const next         = nextSession(show);
    const hasTicketing = show.sessions.some(isTicketing);
    const allPast      = show.sessions.every(isPast);
    const prices       = show.sessions.map(s => s.price).filter(Boolean);
    const minPrice     = prices.length ? prices[0] : '';

    // 城市标签：最多显示6个，超出用 ...
    const MAX_CITIES = 6;
    const cityTagsHtml = cities.slice(0, MAX_CITIES).map(c => `<span class="city-tag">${c}</span>`).join('')
      + (cities.length > MAX_CITIES ? `<span class="city-tag city-tag-more">+${cities.length - MAX_CITIES}</span>` : '');

    // 状态行
    let dotColor, nextTxt;
    if (allPast) {
      dotColor = '#444';
      nextTxt  = '<span style="color:#555">已结束</span>';
    } else if (next) {
      dotColor = hasTicketing ? 'var(--accent)' : '#ece8fb';
      nextTxt  = (hasTicketing ? '<span style="color:var(--accent)">抢票中 · </span>' : '<span style="color:#ece8fb">巡演中 · </span>') + fmt(next.showTime);
    } else {
      dotColor = '#ece8fb';
      nextTxt  = '<span style="color:#ece8fb">巡演中</span>';
    }

    return `
      <div class="card" onclick="openDetail(${show.id})">
        <div class="card-cover" style="${show.image ? `background-image:url('${show.image}')` : `background:${show.cover}`}">
          ${show.image ? '' : `<div class="card-cover-placeholder"><span>🎭</span>暂无封面</div>`}
          ${upcomingCnt ? `<span class="session-badge">${upcomingCnt} 场</span>` : ''}
        </div>
        <div class="card-body">
          <div class="card-title">${show.name}</div>
          <div class="card-performer">${show.performer}</div>
          ${minPrice ? `<div class="card-price">${minPrice}</div>` : ''}
          <div class="city-tags">${cityTagsHtml}</div>
          <div class="next-show">
            <span class="dot" style="background:${dotColor}"></span>
            <span>${nextTxt}</span>
          </div>
        </div>
      </div>`;
  }).join('');
}

// ─────────────────────────────────────────
// 详情弹窗
// ─────────────────────────────────────────
function openDetail(id) {
  const show = shows.find(s => s.id === id);
  if (!show) return;

  detailShowId = id;
  detailLevel  = 1;
  document.getElementById('d-title').textContent = show.name;
  const cities = [...new Set(show.sessions.map(s => s.city))];
  document.getElementById('d-sub').textContent = show.performer + ' · ' + cities.length + ' 个城市';
  document.getElementById('d-share-btn').onclick = () => openShareShow(id);

  document.getElementById('d-body').innerHTML = `
    <div class="d-show-header">
      <div class="d-show-thumb" style="${show.image ? `background-image:url('${show.image}')` : 'background:var(--session-bg)'}"></div>
      <div>
        <div style="font-size:15px;font-weight:600">${show.name}</div>
        <div class="d-show-meta">${show.performer} · 以下 ${cities.length} 个城市演出中</div>
      </div>
    </div>
    <div class="city-grid">
      ${cities.map(city => {
        const cs = show.sessions.filter(s => s.city === city).sort((a,b) => a.showTime.localeCompare(b.showTime));
        const first = cs[0].showTime.slice(5,10).replace('-','.');
        const last  = cs[cs.length-1].showTime.slice(5,10).replace('-','.');
        const dateStr = first === last ? first : first + '-' + last;
        const allPast   = cs.every(isPast);
        const anyTick   = cs.some(isTicketing);
        const cls  = allPast ? 's-past' : anyTick ? 's-ticketing' : 's-upcoming';
        const txt  = allPast ? '已结束'  : anyTick ? '抢票中'     : '即将开演';
        return `<div class="city-card" onclick="openCityDetail(${id},'${city}')">
          <div class="city-card-name">${city}</div>
          ${!allPast ? `<div class="city-card-date">${dateStr}</div>` : ''}
          <div class="city-card-status ${cls}">${txt}</div>
        </div>`;
      }).join('')}
    </div>
    <div style="text-align:center">
      <button class="btn-link" onclick="openUGCForShow(${show.id})">+ 补充此专场场次</button>
    </div>
  `;

  document.getElementById('detailOverlay').classList.add('show');
}

function openCityDetail(showId, city) {
  const show = shows.find(s => s.id === showId);
  if (!show) return;

  const cs = show.sessions
    .filter(s => s.city === city)
    .sort((a, b) => {
      const aPast = isPast(a) ? 1 : 0;
      const bPast = isPast(b) ? 1 : 0;
      if (aPast !== bPast) return aPast - bPast;
      return a.showTime.localeCompare(b.showTime);
    });

  detailLevel = 2;
  document.getElementById('d-sub').textContent = city + ' · ' + cs[0].venue;

  document.getElementById('d-body').innerHTML = `
    <div class="detail-back" onclick="openDetail(${showId})">← 返回全部城市</div>
    ${cs.map(s => {
      const past      = isPast(s);
      const ticketing = isTicketing(s);
      return `
        <div class="session-item" style="${past ? 'opacity:.45' : ''}">
          <div class="session-city">
            <span>${s.venue}</span>
            ${ticketing ? '<span class="badge-sm badge-ticketing">抢票中</span>' : ''}
            ${past      ? '<span class="badge-sm badge-past">已结束</span>'    : ''}
            ${s.source === 'ugc' ? '<span class="badge-sm badge-ugc">用户补充</span>' : ''}
            ${!past ? `<button class="session-share-btn" onclick="openShareSession(${showId},'${city}');event.stopPropagation()">↗ 分享</button>` : ''}
          </div>
          <div class="info-grid">
            <div class="info-item"><label>演出时间</label><span>${fmt(s.showTime)}</span></div>
            <div class="info-item"><label>开售时间</label><span>${fmt(s.ticketSaleTime) || '待公布'}</span></div>
            <div class="info-item"><label>票价</label><span style="color:var(--accent);font-weight:600">${s.price || '待公布'}</span></div>
          </div>
          ${s.ticketLink
            ? `<a class="ticket-btn" href="${s.ticketLink}" target="_blank" rel="noopener">🎟 立即购票</a>`
            : `<p class="no-link">购票链接待补充</p>`}
        </div>`;
    }).join('')}
  `;
}

let detailShowId  = null;
let detailLevel   = 1;   // 1 = 城市列表，2 = 城市详情

function closeDetail() {
  if (detailLevel === 2) {
    openDetail(detailShowId);
  } else {
    closeOverlay('detailOverlay');
  }
}

// ─────────────────────────────────────────
// UGC 弹窗
// ─────────────────────────────────────────
function fillShowSelect(selectedId) {
  document.getElementById('u-show').innerHTML =
    shows.map(s => `<option value="${s.id}"${s.id === selectedId ? ' selected' : ''}>${s.name}</option>`).join('');
}

function openUGC() {
  fillShowSelect();
  document.getElementById('ugcOverlay').classList.add('show');
}

function openUGCForShow(id) {
  closeDetail();
  fillShowSelect(id);
  // 始终重置为「补充已有演出场次」tab
  ugcType = 'session';
  document.querySelectorAll('.ugc-tab').forEach((b, i) => b.classList.toggle('active', i === 0));
  document.getElementById('ugc-session-form').style.display = '';
  document.getElementById('ugc-show-form').style.display    = 'none';
  setTimeout(() => document.getElementById('ugcOverlay').classList.add('show'), 50);
}

// ─────────────────────────────────────────
// 二维码（下载千岛APP）
// ─────────────────────────────────────────
const QR_URL = 'https://qiandao-app.cn/download'; // 替换为真实下载链接
let qrCanvas  = null;

function initQR() {
  return new Promise(resolve => {
    const c = document.createElement('canvas');
    QRCode.toCanvas(c, QR_URL, { width: 180, margin: 1, color: { dark: '#000000', light: '#ffffff' } }, err => {
      if (!err) qrCanvas = c;
      resolve();
    });
  });
}

// 在海报 canvas 上绘制二维码区块
// x, y = 区块左上角；W = 海报宽度；dark = 是否深色背景
function drawQRBlock(ctx, x, y, dark) {
  const QR = 88;   // 二维码尺寸
  const PAD = 14;  // 内边距
  const BW  = QR + PAD * 2 + 130; // 区块总宽
  const BH  = QR + PAD * 2;

  // 背景圆角块
  const bg = dark ? 'rgba(255,255,255,0.08)' : 'rgba(0,0,0,0.06)';
  roundRect(ctx, x, y, BW, BH, 12, bg);

  // 二维码
  if (qrCanvas) {
    ctx.drawImage(qrCanvas, x + PAD, y + PAD, QR, QR);
  }

  // 文案
  const tx = x + PAD + QR + 14;
  const ty = y + PAD;
  const tc = dark ? '#ffffff' : '#111';
  const tc2 = dark ? 'rgba(255,255,255,0.55)' : '#888';

  ctx.fillStyle = '#674cff';
  ctx.font = 'bold 13px PingFang SC, Noto Sans SC, sans-serif';
  ctx.fillText('千岛 APP', tx, ty + 16);

  ctx.fillStyle = tc;
  ctx.font = 'bold 15px PingFang SC, Noto Sans SC, sans-serif';
  ctx.fillText('最新演出 · 排期上新', tx, ty + 38);

  ctx.fillStyle = tc2;
  ctx.font = '12px PingFang SC, Noto Sans SC, sans-serif';
  ctx.fillText('扫码下载，不错过每场好节目', tx, ty + 58);
  ctx.fillText('抢票提醒 · 演出合集 · 演员主页', tx, ty + 76);
}

function roundRect(ctx, x, y, w, h, r, fill) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y); ctx.arcTo(x + w, y, x + w, y + r, r);
  ctx.lineTo(x + w, y + h - r); ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
  ctx.lineTo(x + r, y + h); ctx.arcTo(x, y + h, x, y + h - r, r);
  ctx.lineTo(x, y + r); ctx.arcTo(x, y, x + r, y, r);
  ctx.closePath();
  ctx.fillStyle = fill;
  ctx.fill();
}

// ─────────────────────────────────────────
// ─────────────────────────────────────────
let shareShowId  = null; // null = 全部演出
let shareCity    = 'all';

function openShareSession(showId, city) {
  shareShowId = showId;
  shareCity   = city;
  const show  = shows.find(s => s.id === showId);
  document.getElementById('share-title').textContent = show.name;
  document.getElementById('share-sub').textContent   = show.performer + ' · ' + city;
  buildShareCityBar();
  updateSharePreview();
  document.getElementById('shareOverlay').classList.add('show');
}

function openShareAll() {
  shareShowId = null;
  shareCity   = 'all';
  document.getElementById('share-title').textContent = '分享演出信息';
  document.getElementById('share-sub').textContent   = '选择城市后复制文字或生成海报';
  buildShareCityBar();
  updateSharePreview();
  document.getElementById('shareOverlay').classList.add('show');
}

function openShareShow(id) {
  shareShowId = id;
  shareCity   = 'all';
  const show  = shows.find(s => s.id === id);
  document.getElementById('share-title').textContent = show.name;
  document.getElementById('share-sub').textContent   = show.performer + ' · 选择城市分享';
  buildShareCityBar();
  updateSharePreview();
  document.getElementById('shareOverlay').classList.add('show');
}

function buildShareCityBar() {
  const source = shareShowId
    ? shows.find(s => s.id === shareShowId).sessions
    : shows.flatMap(s => s.sessions);
  const cities = [...new Set(source.map(s => s.city))].sort();
  document.getElementById('share-city-bar').innerHTML =
    ['all', ...cities].map(c =>
      `<button class="share-city-btn${c === shareCity ? ' active' : ''}" onclick="setShareCity('${c}')">
        ${c === 'all' ? '全部城市' : c}
      </button>`
    ).join('');
}

function setShareCity(city) {
  shareCity = city;
  buildShareCityBar();
  updateSharePreview();
}

function getShareShows() {
  let list = shareShowId ? shows.filter(s => s.id === shareShowId) : shows;
  if (shareCity !== 'all') {
    list = list.filter(show => show.sessions.some(s => s.city === shareCity));
  }
  return list;
}

function getShareSessions(show) {
  return show.sessions
    .filter(s => shareCity === 'all' || s.city === shareCity)
    .filter(isUpcoming)
    .sort((a, b) => new Date(a.showTime) - new Date(b.showTime));
}

function updateSharePreview() {
  const list  = getShareShows();
  const city  = shareCity === 'all' ? '全国' : shareCity;
  const url   = window.location.href;
  let text    = `脱口秀专场推荐 | ${city}\n${'─'.repeat(20)}\n\n`;

  list.forEach(show => {
    const sessions = getShareSessions(show);
    if (!sessions.length) return;
    text += `${show.name} / ${show.performer}\n`;
    sessions.forEach(s => {
      text += `  ${s.city} · ${s.venue}\n`;
      text += `  ${fmt(s.showTime)}\n`;
      if (s.price) text += `  票价：${s.price}\n`;
      if (s.ticketSaleTime) text += `  开售：${fmt(s.ticketSaleTime)}\n`;
    });
    text += '\n';
  });

  text += `更多信息 >> ${url}`;
  document.getElementById('share-preview').value = text;
}

function copyShareText() {
  const text = document.getElementById('share-preview').value;
  if (navigator.share) {
    navigator.share({ text }).catch(() => {});
  } else {
    navigator.clipboard.writeText(text).then(() => {
      showToast('文字已复制到剪贴板');
    }).catch(() => {
      document.getElementById('share-preview').select();
      document.execCommand('copy');
      showToast('文字已复制到剪贴板');
    });
  }
}

function generatePoster() {
  const list = getShareShows().filter(show => getShareSessions(show).length);
  const city = shareCity === 'all' ? '全国' : shareCity;
  // 单演出且有封面图 → 封面海报
  if (shareShowId && list.length === 1 && list[0].image) {
    generateShowPoster(list[0]);
  } else {
    generateListPoster(list, city);
  }
}

// ── 单演出封面海报 ──────────────────────────
function generateShowPoster(show) {
  const sessions = getShareSessions(show);
  const city     = shareCity === 'all' ? '全国' : shareCity;
  const canvas   = document.getElementById('posterCanvas');
  const ctx      = canvas.getContext('2d');

  // 图片区域：3:4比例，左右各留28px边距
  const PAD = 28;
  const IW  = 750 - PAD * 2;          // 694
  const IH  = Math.round(IW * 4 / 3); // 925
  const IY  = PAD;

  // 信息卡片内容行高预算
  const FONT_NAME = 'bold 38px PingFang SC, Noto Sans SC, sans-serif';
  ctx.font = FONT_NAME;
  const nameLines = getWrappedLines(ctx, show.name, IW - 64);
  const cardContentH = nameLines.length * 52  // 演出名
    + 16 + 34                                  // 演员名
    + 24                                        // 分割线区
    + (sessions.length ? 60 + 36 + (sessions[0].price ? 40 : 0) : 0)
    + 12;
  const CH  = 44 + cardContentH + 36;          // 卡片总高（上下内边距）
  const CY  = IY + IH + 16;

  // 底栏高度
  const FOOT_H = 140;
  const W = 750, H = CY + CH + 20 + FOOT_H;
  canvas.width = W; canvas.height = H;

  const img = new Image();
  img.crossOrigin = 'anonymous';
  img.onload = () => {
    // 1. 背景
    ctx.fillStyle = '#150a30';
    ctx.fillRect(0, 0, W, H);

    // 2. 演出封面（3:4 圆角裁剪）
    ctx.save();
    roundRect(ctx, PAD, IY, IW, IH, 20);
    ctx.clip();
    const ir = img.width / img.height, cr = IW / IH;
    let dw, dh, dx, dy;
    if (ir > cr) { dh = IH; dw = IH * ir; dx = PAD + (IW - dw) / 2; dy = IY; }
    else         { dw = IW; dh = IW / ir; dx = PAD; dy = IY + (IH - dh) / 2; }
    ctx.drawImage(img, dx, dy, dw, dh);
    ctx.restore();

    // 3. 信息卡片背景
    ctx.fillStyle = 'rgba(10, 5, 28, 0.97)';
    roundRect(ctx, PAD, CY, IW, CH, 16, 'rgba(10, 5, 28, 0.97)');

    const PX = PAD + 32;  // 卡片内左边距
    let ty = CY + 44;

    // 演出名称
    ctx.font = FONT_NAME;
    ctx.fillStyle = '#ffffff';
    nameLines.forEach(line => { ctx.fillText(line, PX, ty); ty += 52; });

    // 演员名（与标题间距8px）
    ty += 8;
    ctx.font = '26px PingFang SC, Noto Sans SC, sans-serif';
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.fillText(show.performer, PX, ty);
    ty += 34;

    // 分割线
    ty += 20;
    ctx.strokeStyle = 'rgba(255,255,255,0.12)';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(PX, ty); ctx.lineTo(PAD + IW - 32, ty); ctx.stroke();
    ty += 24;

    if (sessions.length) {
      const s = sessions[0];

      // 日期（大字）
      ctx.font = 'bold 46px PingFang SC, Noto Sans SC, sans-serif';
      ctx.fillStyle = '#a294f8';
      ctx.fillText(s.showTime.slice(0, 10).replace(/-/g, '.'), PX, ty + 44);
      ty += 60;

      // 城市 · 场馆
      ctx.font = '24px PingFang SC, Noto Sans SC, sans-serif';
      ctx.fillStyle = 'rgba(255,255,255,0.5)';
      ctx.fillText(clipText(ctx, s.city + ' · ' + s.venue, IW - 80), PX, ty + 12);
      ty += 36;

      // 票价
      if (s.price) {
        ctx.font = 'bold 26px PingFang SC, Noto Sans SC, sans-serif';
        ctx.fillStyle = '#a294f8';
        ctx.fillText(s.price, PX, ty + 12);
        ty += 40;
      }
    }

    // 4. 底栏
    const FY = CY + CH + 20;
    ctx.strokeStyle = 'rgba(255,255,255,0.1)';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(PAD, FY); ctx.lineTo(W - PAD, FY); ctx.stroke();

    ctx.font = 'bold 26px PingFang SC, Noto Sans SC, sans-serif';
    ctx.fillStyle = '#ffffff';
    ctx.fillText('🎤脱口秀专场上新早知道', PAD + 16, FY + 48);

    ctx.font = '20px PingFang SC, Noto Sans SC, sans-serif';
    ctx.fillStyle = 'rgba(255,255,255,0.45)';
    ctx.fillText('长按扫码，查看最新演出', PAD + 16, FY + 80);

    if (qrCanvas) {
      ctx.drawImage(qrCanvas, W - PAD - 16 - 108, FY + 10, 108, 108);
    }

    downloadCanvas(canvas, show.name + '_' + city + '.png');
  };
  img.onerror = () => generateListPoster([show], city);
  img.src = show.image;
}

// ── 多演出列表海报 ──────────────────────────
function generateListPoster(list, city) {
  const canvas = document.getElementById('posterCanvas');
  const ctx    = canvas.getContext('2d');
  const W = 750, ROW_H = 120, HEAD_H = 160, FOOT_H = 160;
  const H = HEAD_H + list.length * ROW_H + FOOT_H;
  canvas.width = W; canvas.height = H;

  ctx.fillStyle = '#0f0f11';
  ctx.fillRect(0, 0, W, H);

  ctx.fillStyle = '#674cff';
  ctx.fillRect(0, 0, W, 7);

  ctx.fillStyle = '#674cff';
  ctx.font = 'bold 38px PingFang SC, Noto Sans SC, sans-serif';
  ctx.fillText('脱口秀专场', 50, 72);

  ctx.fillStyle = '#888';
  ctx.font = '20px PingFang SC, Noto Sans SC, sans-serif';
  ctx.fillText(city + ' 演出信息', 50, 108);

  ctx.strokeStyle = '#2a2a35';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(50, 138); ctx.lineTo(W - 50, 138); ctx.stroke();

  let y = HEAD_H;
  list.forEach(show => {
    const s = getShareSessions(show)[0];

    ctx.fillStyle = '#e8e8e8';
    ctx.font = 'bold 22px PingFang SC, Noto Sans SC, sans-serif';
    ctx.fillText(clipText(ctx, show.name, 400), 50, y + 30);

    ctx.fillStyle = '#888';
    ctx.font = '15px PingFang SC, Noto Sans SC, sans-serif';
    ctx.fillText(show.performer, 50, y + 54);

    if (s) {
      ctx.fillStyle = '#666';
      ctx.font = '14px PingFang SC, Noto Sans SC, sans-serif';
      ctx.fillText(s.city + ' · ' + clipText(ctx, s.venue, 320), 50, y + 78);
      ctx.fillText(fmt(s.showTime), 50, y + 98);
      if (s.price) { ctx.fillStyle = '#674cff'; ctx.fillText(s.price, W - 160, y + 78); }
    }

    ctx.strokeStyle = '#1a1a22';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(50, y + ROW_H - 6); ctx.lineTo(W - 50, y + ROW_H - 6); ctx.stroke();
    y += ROW_H;
  });

  // 二维码区块
  const qrY = H - FOOT_H + 20;
  ctx.strokeStyle = '#2a2a35';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(50, qrY - 12); ctx.lineTo(W - 50, qrY - 12); ctx.stroke();

  drawQRBlock(ctx, 50, qrY, false);

  downloadCanvas(canvas, '脱口秀专场_' + city + '.png');
}

// ── 工具函数 ────────────────────────────────
function getWrappedLines(ctx, text, maxWidth) {
  const lines = [];
  let line = '';
  for (const char of text) {
    const test = line + char;
    if (ctx.measureText(test).width > maxWidth && line) {
      lines.push(line); line = char;
    } else { line = test; }
  }
  if (line) lines.push(line);
  return lines;
}

function wrapText(ctx, text, x, y, maxWidth, lineHeight) {
  let line = '';
  for (const char of text) {
    const test = line + char;
    if (ctx.measureText(test).width > maxWidth && line) {
      ctx.fillText(line, x, y);
      line = char;
      y += lineHeight;
    } else {
      line = test;
    }
  }
  if (line) ctx.fillText(line, x, y);
}

function clipText(ctx, text, maxWidth) {
  if (ctx.measureText(text).width <= maxWidth) return text;
  while (text.length > 1 && ctx.measureText(text + '...').width > maxWidth) text = text.slice(0, -1);
  return text + '...';
}

function downloadCanvas(canvas, filename) {
  canvas.toBlob(blob => {
    const file = new File([blob], filename, { type: 'image/png' });
    if (navigator.canShare && navigator.canShare({ files: [file] })) {
      navigator.share({ files: [file], title: '脱口秀专场海报' })
        .catch(() => {});
    } else {
      const url = URL.createObjectURL(blob);
      const a   = Object.assign(document.createElement('a'), { href: url, download: filename });
      a.click();
      URL.revokeObjectURL(url);
      showToast('海报已生成，请查看下载文件');
    }
  });
}

// ─────────────────────────────────────────
// UGC 提交 & 审核
// ─────────────────────────────────────────
const ADMIN_PASSWORD = 'talkshow2026'; // 可自行修改
let ugcType = 'session';
let titleClickCount = 0;
let titleClickTimer  = null;

function setUGCType(type, btn) {
  ugcType = type;
  document.querySelectorAll('.ugc-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('ugc-session-form').style.display = type === 'session' ? '' : 'none';
  document.getElementById('ugc-show-form').style.display    = type === 'show'    ? '' : 'none';
}

function submitUGC() {
  const city     = document.getElementById('u-city').value.trim();
  const venue    = document.getElementById('u-venue').value.trim();
  const showTime = document.getElementById('u-showtime').value;
  const tickTime = document.getElementById('u-tickettime').value;
  const price    = document.getElementById('u-price').value.trim();
  const link     = document.getElementById('u-link').value.trim();

  if (!city || !venue || !showTime) { alert('请填写城市、场馆和演出时间'); return; }

  const pending = getPending();

  if (ugcType === 'session') {
    const showId = parseInt(document.getElementById('u-show').value);
    pending.push({
      id: 'p_' + Date.now(), type: 'session',
      showId, city, venue, price,
      showTime: showTime.replace('T', ' '),
      ticketSaleTime: tickTime ? tickTime.replace('T', ' ') : '',
      ticketLink: link,
      submittedAt: new Date().toLocaleString('zh-CN'), status: 'pending'
    });
  } else {
    const name      = document.getElementById('u-name').value.trim();
    const performer = document.getElementById('u-performer').value.trim();
    const image     = document.getElementById('u-image').value.trim();
    if (!name || !performer) { alert('请填写演出名称和演员'); return; }
    pending.push({
      id: 'p_' + Date.now(), type: 'show',
      name, performer, image, city, venue, price,
      showTime: showTime.replace('T', ' '),
      ticketSaleTime: tickTime ? tickTime.replace('T', ' ') : '',
      ticketLink: link,
      submittedAt: new Date().toLocaleString('zh-CN'), status: 'pending'
    });
  }

  savePending(pending);
  ['u-city','u-venue','u-showtime','u-tickettime','u-price','u-link','u-name','u-performer','u-image']
    .forEach(id => { const el = document.getElementById(id); if (el) el.value = ''; });
  closeOverlay('ugcOverlay');
  showToast('已提交！审核通过后将显示在页面上，感谢贡献');
}

// ── localStorage ──
function getPending() {
  try { return JSON.parse(localStorage.getItem('ts_pending') || '[]'); } catch { return []; }
}
function savePending(data) { localStorage.setItem('ts_pending', JSON.stringify(data)); }

// 页面加载时把已审核通过的内容合并进 shows
function loadApproved() {
  getPending().filter(p => p.status === 'approved').forEach(item => {
    if (item.type === 'session') {
      const show = shows.find(s => s.id === item.showId);
      if (show && !show.sessions.find(s => s.id === item.id)) {
        show.sessions.push({
          id: item.id, city: item.city, venue: item.venue, price: item.price,
          showTime: item.showTime, ticketSaleTime: item.ticketSaleTime,
          ticketLink: item.ticketLink, source: 'ugc'
        });
      }
    } else if (item.type === 'show') {
      if (!shows.find(s => s.id === item.id)) {
        shows.push({
          id: item.id, name: item.name, performer: item.performer,
          image: item.image || '', cover: 'linear-gradient(135deg, #2a2a3d, #1a2a2a)',
          sessions: [{
            id: item.id + '_s1', city: item.city, venue: item.venue, price: item.price,
            showTime: item.showTime, ticketSaleTime: item.ticketSaleTime,
            ticketLink: item.ticketLink, source: 'ugc'
          }]
        });
      }
    }
  });
}

// ── 管理员入口：标题连点5次 ──
function onTitleClick() {
  titleClickCount++;
  clearTimeout(titleClickTimer);
  titleClickTimer = setTimeout(() => { titleClickCount = 0; }, 2000);
  if (titleClickCount >= 5) {
    titleClickCount = 0;
    const pwd = prompt('请输入管理员密码');
    if (pwd === ADMIN_PASSWORD) { openAdmin(); }
    else if (pwd !== null) { alert('密码错误'); }
  }
}

function openAdmin() {
  renderAdmin();
  document.getElementById('adminOverlay').classList.add('show');
}

function renderAdmin() {
  const pending = getPending().filter(p => p.status === 'pending');
  document.getElementById('admin-sub').textContent = `待审核 ${pending.length} 条`;
  const body = document.getElementById('admin-body');
  if (!pending.length) {
    body.innerHTML = '<div class="admin-empty">暂无待审核内容</div>';
    return;
  }
  body.innerHTML = pending.map(item => {
    const showName  = item.type === 'session'
      ? (shows.find(s => s.id === item.showId)?.name || '未知演出')
      : item.name;
    const typeLabel = item.type === 'session' ? '补充场次' : '新增演出';
    return `
      <div class="admin-item">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">
          <div>
            <div class="admin-item-title">${showName}</div>
            <div class="admin-item-meta">${typeLabel} · 提交于 ${item.submittedAt}</div>
          </div>
          <span class="badge-sm badge-ugc">${typeLabel}</span>
        </div>
        <div style="font-size:13px;color:var(--text-muted);line-height:2">
          ${item.type === 'show' ? `演员：${item.performer}<br>` : ''}
          城市：${item.city} · 场馆：${item.venue}<br>
          演出时间：${item.showTime}<br>
          ${item.ticketSaleTime ? `开售时间：${item.ticketSaleTime}<br>` : ''}
          ${item.price ? `票价：${item.price}<br>` : ''}
          ${item.ticketLink ? `购票链接：<a href="${item.ticketLink}" target="_blank" style="color:var(--accent)">${item.ticketLink}</a>` : ''}
        </div>
        <div class="admin-actions">
          <button class="btn-approve" onclick="approveItem('${item.id}')">通过</button>
          <button class="btn-reject"  onclick="rejectItem('${item.id}')">拒绝</button>
        </div>
      </div>`;
  }).join('');
}

function approveItem(id) {
  const pending = getPending();
  const item = pending.find(p => p.id === id);
  if (item) {
    item.status = 'approved';
    savePending(pending);
    loadApproved();
    buildCityBar();
    render();
    renderAdmin();
    showToast('已通过，内容已显示在页面上');
  }
}

function rejectItem(id) {
  const pending = getPending();
  const idx = pending.findIndex(p => p.id === id);
  if (idx !== -1) {
    pending.splice(idx, 1);
    savePending(pending);
    renderAdmin();
    showToast('已拒绝');
  }
}

// ─────────────────────────────────────────
// 工具
// ─────────────────────────────────────────
function closeOverlay(id) {
  document.getElementById(id).classList.remove('show');
}

function onOverlayClick(e, id) {
  if (e.target === document.getElementById(id)) closeOverlay(id);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

fetch('data.json')

    shows = data;
    loadApproved();

    initQR();
